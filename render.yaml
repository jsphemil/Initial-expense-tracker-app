services:
  - type: web
    name: expense-tracker-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false

  - type: static
    name: expense-tracker-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
